work_dir: ./work_dir/test/
phase: train
save_interval: 1
random_seed: 123
eval_interval: 1
log_interval: 100
evaluate_tool: sclite

# feeder args

feeder: VideoFeeder
dataset: TLD_YT
num_worker: 10
transfer_label: false

# model args

model: TLD_resnet
model_args:
  loss_weights:
    headtail: 1.0

# load_weights: 

# optim args

batch_size: 32
test_batch_size: 32
optimizer_args:
  base_lr: 0.001
  # base_lr: 0.0001
  learning_ratio: 1
  nesterov: false
  optimizer: AdamW
  start_epoch: 0
  step:
  - 6
  - 8
  weight_decay: 0.0001
num_epoch: 10